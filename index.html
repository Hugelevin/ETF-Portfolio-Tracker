<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#18564c" />
    <meta name="description" content="A private, local-first EUR UCITS portfolio tracker." />
    <meta name="application-name" content="ETF Portfolio Tracker" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <style>
      .boot-shell{min-height:100vh;background:#f4f7f5;color:#172824;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.boot-top{height:78px;border-bottom:1px solid #d2dfda;background:#f9fbfa}.boot-main{max-width:1480px;margin:auto;padding:48px max(16px,4vw)}.boot-private{margin:0 0 7px;color:#286f63;font-size:12px;font-weight:800;letter-spacing:.13em;text-transform:uppercase}.boot-shell h1{margin:0 0 32px;font-size:clamp(32px,4vw,48px);line-height:1.15;letter-spacing:-.045em}.boot-summary{height:212px;border-radius:20px;background:linear-gradient(135deg,#103d34,#1d5a4f)}@media(max-width:700px){.boot-top{height:72px}.boot-main{padding:24px 16px}.boot-private{font-size:10px}.boot-shell h1{margin-bottom:20px;font-size:32px}.boot-summary{height:256px;border-radius:18px}}
    </style>
    <title>ETF Portfolio Tracker</title>
  </head>
  <body><div id="root"><div class="boot-shell" aria-hidden="true"><div class="boot-top"></div><main class="boot-main"><p class="boot-private">Private - Local to This Browser</p><h1>Portfolio Dashboard</h1><div class="boot-summary"></div></main></div></div><script type="module" src="/src/main.tsx"></script></body>
</html>
